# ── Connection limiting — 100 concurrent per IP ──────────────────────────
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

server {
    listen 80;
    server_name localhost;

    # ── Global security headers ───────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                                              always;
    add_header X-Content-Type-Options     "nosniff"                                           always;
    add_header Referrer-Policy            "same-origin"                                       always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"           always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains"                always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;

    # ── Gzip compression for JSON / text responses ────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length   1024;
    gzip_vary         on;

    # ── Connection cap ────────────────────────────────────────────────────
    limit_conn per_ip 100;

    # ── Health check — lightweight, no SPA overhead ──────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── SPA — React app ───────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — 1-hour cache ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|woff2|svg)$ {
        root    /usr/share/nginx/html/app;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    # ── SSE streaming endpoint — MUST disable buffering ───────────────────
    # Without proxy_buffering off + X-Accel-Buffering: no, nginx holds the
    # stream in its buffer before flushing to the client, destroying TTFT.
    location /api/chat/stream {
        proxy_pass             http://backend:8000/api/chat/stream;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        "";
        proxy_read_timeout     300s;
        proxy_connect_timeout  60s;
        # Disable all buffering for SSE
        proxy_buffering        off;
        proxy_cache            off;
        add_header             X-Accel-Buffering no;
        # CORS for preflight (if needed)
        add_header             Cache-Control     "no-cache";
    }

    # ── General API proxy ─────────────────────────────────────────────────
    location /api {
        proxy_pass             http://backend:8000/api;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     300s;
        proxy_connect_timeout  60s;
        # Buffer API responses (non-streaming)
        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          4 64k;
    }

    # ── Gradio / admin UI ─────────────────────────────────────────────────
    location /ui {
        proxy_pass             http://backend:8000/ui;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
    }
}

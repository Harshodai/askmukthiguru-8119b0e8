server {
    listen 80;
    server_name localhost;

    # Serve the main React app (Vite build output)
    location / {
        root /usr/share/nginx/html/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve Chat UI widget at /chat
    location /chat {
        alias /usr/share/nginx/html/chat/;
        index index.html;
        try_files $uri $uri/ /chat/index.html;
    }

    # Serve Ingestion UI at /ingest
    location /ingest {
        alias /usr/share/nginx/html/ingest/;
        index index.html;
        try_files $uri $uri/ /ingest/index.html;
    }

    # Proxy API requests to the backend
    location /api {
        proxy_pass http://backend:8000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # Proxy Gradio UI
    location /ui {
        proxy_pass http://backend:8000/ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html/app;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

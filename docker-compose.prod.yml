# ============================================================
# Mukthi Guru — Production Docker Compose
# ============================================================
# This configuration is designed for deploying to a VPS (e.g., EC2, DigitalOcean).
# It relies on environment variables set on the server and uses built images.

version: '3.8'

services:
  # --- Frontend (React + Nginx) ---
  frontend:
    image: ghcr.io/your-org/askmukthiguru-frontend:latest
    container_name: mukthiguru-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    restart: always

  # --- Backend (FastAPI) ---
  backend:
    image: ghcr.io/your-org/askmukthiguru-backend:latest
    container_name: mukthiguru-backend-prod
    environment:
      - ENV=production
      - LLM_PROVIDER=${LLM_PROVIDER:-sarvam_cloud}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - qdrant
      - redis
    restart: always

  # --- Vector DB (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: mukthiguru-qdrant-prod
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # --- Cache (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: mukthiguru-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always

volumes:
  qdrant_data:
  redis_data:

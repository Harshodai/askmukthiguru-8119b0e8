# ═══════════════════════════════════════════════════════════════════════════════
# Mukthi Guru — vLLM GPU Inference Service (FUTURE-READY — NOT ACTIVE)
# ═══════════════════════════════════════════════════════════════════════════════
#
# ACTIVATE WHEN: GPU hardware is available (≥16GB VRAM recommended for 7B models)
#
# To enable:
#   1. Uncomment the vllm service below
#   2. Set LLM_PROVIDER=vllm_openai in backend env
#   3. Set VLLM_BASE_URL=http://vllm:8080/v1 in backend env
#   4. Ensure GPU runtime is configured on the host (NVIDIA Container Toolkit)
#
# Why vLLM:
#   - PagedAttention: KV-cache paging removes OOM from long contexts
#   - Continuous batching: serves multiple requests simultaneously (not request-by-request)
#   - Prefix caching: shared system prompts cached across requests (~50% TTFT reduction)
#   - OpenAI-compatible API: drop-in for all providers that speak /v1/chat/completions
#
# ───────────────────────────────────────────────────────────────────────────────


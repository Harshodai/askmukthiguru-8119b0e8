# Minikube-specific overrides
# Use with: helm install mukthiguru -f values-minikube.yaml

minikube:
  enabled: true

replicaCount: 2

backend:
  image:
    repository: mukthiguru-backend
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"

frontend:
  image:
    repository: mukthiguru-frontend
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

redis:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

qdrant:
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

neo4j:
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

jaeger:
  enabled: true
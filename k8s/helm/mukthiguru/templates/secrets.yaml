{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mukthiguru.fullname" . }}-secrets
  labels:
    {{- include "mukthiguru.labels" . | nindent 4 }}
type: Opaque
data:
  SARVAM_API_KEY: {{ .Values.secrets.SARVAM_API_KEY | default "" | b64enc | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.NEO4J_PASSWORD | default "" | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.REDIS_PASSWORD | default (.Values.redis.auth.password | default "") | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | default "" | b64enc | quote }}
{{- end }}
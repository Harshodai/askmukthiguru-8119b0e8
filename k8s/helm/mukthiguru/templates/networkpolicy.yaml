{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mukthiguru.backend.fullname" . }}-netpol
  labels:
    {{- include "mukthiguru.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "mukthiguru.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS — cluster DNS only (kube-dns in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Qdrant (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: qdrant
      ports:
        - protocol: TCP
          port: 6333
    # Neo4j (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: neo4j
      ports:
        - protocol: TCP
          port: 7687
    # Redis (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    # External HTTPS — web ingestion and Supabase only (no LLM providers; inference runs local)
    {{- if .Values.networkPolicy.egressProxy.enabled }}
    # Egress proxy (Cilium egress gateway or similar) — enforces destination allowlist at proxy layer
    - to:
        - podSelector:
            matchLabels:
              {{- range $key, $value := .Values.networkPolicy.egressProxy.labels }}
              {{ $key }}: {{ $value }}
              {{- end }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.egressProxy.namespace }}
      ports:
        - protocol: TCP
          port: 443
    {{- else }}
    # Explicit Supabase CIDR allowlist — REQUIRED for production when egress proxy not used.
    # Configure .Values.networkPolicy.supabaseEgressCIDRs with your Supabase project egress IPs.
    {{- if .Values.networkPolicy.supabaseEgressCIDRs }}
    {{- range .Values.networkPolicy.supabaseEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- else }}
    {{- fail "networkPolicy.supabaseEgressCIDRs must be set when egressProxy.enabled=false. Add your Supabase project egress CIDRs to values.yaml." }}
    {{- end }}
    {{- end }}
{{- end }}

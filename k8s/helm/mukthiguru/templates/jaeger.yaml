{{- if .Values.jaeger.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mukthiguru.fullname" . }}-jaeger
  labels:
    {{- include "mukthiguru.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  type: ClusterIP
  ports:
    - port: 14250
      targetPort: 14250
      protocol: TCP
      name: grpc
    - port: 16686
      targetPort: 16686
      protocol: TCP
      name: ui
    - port: 6831
      targetPort: 6831
      protocol: UDP
      name: jaeger-compact
  selector:
    app.kubernetes.io/component: jaeger
    {{- include "mukthiguru.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mukthiguru.fullname" . }}-jaeger
  labels:
    {{- include "mukthiguru.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: jaeger
      {{- include "mukthiguru.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: jaeger
        {{- include "mukthiguru.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          ports:
            - containerPort: 14250
              name: grpc
            - containerPort: 16686
              name: ui
            - containerPort: 6831
              protocol: UDP
              name: jaeger-compact
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
{{- end }}
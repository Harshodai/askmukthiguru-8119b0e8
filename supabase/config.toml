project_id = "ozmjeuqbholoxypfxixb"

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = [
  "http://localhost:8080/**",
  "http://127.0.0.1:8080/**",
  "http://localhost:3000/**",
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
  "http://localhost/**",
  "http://127.0.0.1/**",
  "http://localhost:80/**",
  "http://127.0.0.1:80/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.mfa]
max_enrolled_factors = 10

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[auth.external.facebook]
enabled = true
client_id = "env(FACEBOOK_CLIENT_ID)"
secret = "env(FACEBOOK_CLIENT_SECRET)"

[functions.healthz]
verify_jwt = false

[functions.chat-rate-limit]
verify_jwt = false

[functions.push-send]
verify_jwt = false

[functions.telemetry]
verify_jwt = true

[functions.admin-telemetry]
verify_jwt = true

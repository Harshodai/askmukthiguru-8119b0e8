# ============================================================
# Mukthi Guru — Full Stack Docker Compose
#
# All services start by default. For resource-constrained environments,
# you can create a docker-compose.override.yml to exclude ops services.
#
# Ollama runs on the HOST machine (not in Docker) because:
#   - Windows Docker doesn't support GPU passthrough easily
#   - Ollama Desktop is already installed and running
#   - The backend connects to Ollama via host.docker.internal
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Watch logs
#   docker compose down           # Stop all services
# ============================================================

services:
  # --- Neo4j Database ---
  neo4j:
    image: neo4j:5.17.0
    container_name: mukthiguru-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-mukthiguru_neo4j_pass}
      - NEO4J_PLUGINS=["apoc","n10s","graph-data-science"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: mukthiguru-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mukthiguru_redis_pass}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mukthiguru_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
    restart: unless-stopped

  # --- Observability / Tracing ---
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: mukthiguru-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: mukthiguru-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
    restart: unless-stopped

  # --- FastAPI Backend ---
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mukthiguru-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment: &backend-env
      - HF_HUB_OFFLINE=1  # Prevent huggingface_hub SSL failures on Docker Desktop gRPC-FUSE
      # === LLM Provider ===
      # "sarvam_cloud" (default) or "ollama" (requires Ollama on host)
      - LLM_PROVIDER=${LLM_PROVIDER:-sarvam_cloud}
      # --- Sarvam Cloud API (config-driven — any model name works) ---
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - SARVAM_CLOUD_MODEL=${SARVAM_CLOUD_MODEL:-sarvam-30b}
      - SARVAM_CLOUD_CLASSIFY_MODEL=${SARVAM_CLOUD_CLASSIFY_MODEL:-sarvam-30b}
      - SARVAM_BASE_URL=${SARVAM_BASE_URL:-https://api.sarvam.ai/v1}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      - PIPELINE_TIMEOUT=${PIPELINE_TIMEOUT:-300}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}
      - SARVAM_REASONING_EFFORT=${SARVAM_REASONING_EFFORT:-medium}
      - SARVAM_REASONING_EFFORT_FAST=${SARVAM_REASONING_EFFORT_FAST:-low}
      - SARVAM_REASONING_EFFORT_COMPLEX=${SARVAM_REASONING_EFFORT_COMPLEX:-high}
      - SARVAM_RPM_LIMIT=${SARVAM_RPM_LIMIT:-60}
      - SERENE_MIND_ENABLED=${SERENE_MIND_ENABLED:-true}
      # --- OpenRouter (free tier for simple queries) ---
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - USE_OPENROUTER_FOR_SIMPLE=${USE_OPENROUTER_FOR_SIMPLE:-true}
      - OPENROUTER_FAST_MODEL=${OPENROUTER_FAST_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}
      - OPENROUTER_GENERATION_MODEL=${OPENROUTER_GENERATION_MODEL:-}
      - OPENROUTER_CLASSIFY_MODEL=${OPENROUTER_CLASSIFY_MODEL:-}
      - OPENROUTER_RPM_LIMIT=${OPENROUTER_RPM_LIMIT:-20}
      # --- Nvidia NIM (hosted API Catalog) ---
      - NIM_API_KEY=${NIM_API_KEY:-}
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NIM_GENERATION_MODEL=${NIM_GENERATION_MODEL:-minimaxai/minimax-m2.7}
      - NIM_CLASSIFY_MODEL=${NIM_CLASSIFY_MODEL:-meta/llama-3.1-8b-instruct}
      - NIM_RPM_LIMIT=${NIM_RPM_LIMIT:-30}
      # --- Guardrails ---
      - GUARDRAILS_PROVIDER=${GUARDRAILS_PROVIDER:-nemo}
      # --- Retrieval Quality ---
      - RERANK_MIN_SCORE=${RERANK_MIN_SCORE:-0.15}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-true}
      - SEMANTIC_CACHE_SIMILARITY=${SEMANTIC_CACHE_SIMILARITY:-0.85}
      # --- Observability ---
      - ENABLE_CORRELATION_IDS=${ENABLE_CORRELATION_IDS:-true}
      # --- Ollama (only used when LLM_PROVIDER=ollama) ---
      # Model Preset: "qwen" (default) or "sarvam" (requires custom GGUF import)
      - MODEL_PRESET=${MODEL_PRESET:-qwen}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-deepseek-v4-flash:cloud}
      - OLLAMA_CLASSIFY_MODEL=${OLLAMA_CLASSIFY_MODEL:-deepseek-v4-flash:cloud}
      - OLLAMA_FAST_MODEL=${OLLAMA_FAST_MODEL:-deepseek-v4-flash:cloud}
      # Ollama runs on the HOST, not in Docker
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Qdrant runs as a sibling container
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=spiritual_wisdom
      - QDRANT_LOCAL_PATH=
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      # Neo4j Graph DB
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      # Embedding models (downloaded on first run)
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-384}
      - RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      # Model cache on overlay filesystem (NOT on hf_model_cache volume)
      # to avoid Docker Desktop gRPC-FUSE mmap failures on large .safetensors files.
      - HF_HOME=/app/model_cache/huggingface
      - TRANSFORMERS_CACHE=/app/model_cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache/sentence_transformers
      # Whisper / Transcription
      - WHISPER_MODEL=large-v3
      - WHISPER_BACKEND=faster-whisper
      - WHISPER_COMPUTE_TYPE=float16
      - TRANSCRIPT_LANGUAGES=en,hi,bn,te,mr,ta,ur,gu,kn,ml,or,pa,as,mai,sa,ks,ne,sd,kok,doi,mni,sat,brx
      - TRANSCRIPT_CONCURRENT_WORKERS=4
      - OCR_LANGUAGES=en,hi
      # Redis cache
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      # OpenTelemetry
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=mukthiguru-backend
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=^(?!.*\/api\/chat(?:\/stream)?(?:\?.*)?$).*
      - OPENINFERENCE_HIDE_EMBEDDINGS_VECTORS=true
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      # Workers: default to 1 worker for development to prevent OOM errors on resource-limited
      # Docker hosts. Can be scaled up in production by setting WEB_CONCURRENCY env var.
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      # Disable Sarvam debug log (prevents unbounded sarvam_debug.json growth)
      - SARVAM_DEBUG=false
      # Reranker: prefer FlashRank API path; image falls back to CrossEncoder automatically
      - USE_FLASHRANK=${USE_FLASHRANK:-true}
      # Auth
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      # Development only. In production, set this to allowed origins (e.g. https://myapp.com)
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set to allowed origins}
    depends_on:
      jaeger:
        condition: service_started
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '4.0'
    restart: unless-stopped
    volumes: &backend-volumes
      # Cache HuggingFace models across rebuilds (prevents re-download on every docker build)
      - hf_model_cache:/app/.cache
      - ./.model_cache:/app/model_cache
      # Persist SQLite telemetry database
      - telemetry_data:/app/data
      # Mount backend code and scripts for live-reloading/direct execution
      - ./app:/app/app
      - ./rag:/app/rag
      - ./services:/app/services
      - ./guardrails:/app/guardrails
      - ./routers:/app/routers
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ../scripts:/app/scripts
      - ../results:/app/results
      - ../memory:/app/memory
      - ./repos/LightRAG/lightrag:/usr/local/lib/python3.12/site-packages/lightrag
    # Allow access to host's Ollama (if LLM_PROVIDER=ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Celery Worker (playlist ingestion + OKF extraction/compile) ---
  # Fix: ingest_tasks.ingest_playlist / okf_extract_tasks / okf_compile_tasks were
  # enqueued to Redis but nothing consumed them — playlist ingestion from the admin
  # UI silently hung forever. Reuses the backend image/env via the &backend-env anchor.
  celery-worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mukthiguru-celery-worker
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_config inspect ping -d celery@$$HOSTNAME --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - ../.env
    environment: *backend-env
    command: >
      celery -A celery_config worker
      --loglevel=info
      --queues=transcription,embedding,indexing,ingestion,okf
      --concurrency=${CELERY_CONCURRENCY:-1}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    restart: unless-stopped
    volumes: *backend-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Frontend (Nginx Proxy) ---
  frontend:
    build:
      context: ..
      dockerfile: frontend.Dockerfile
      args:
        VITE_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_ANON_KEY}
        VITE_USE_NATIVE_OAUTH: ${USE_NATIVE_OAUTH:-true}
        VITE_JAEGER_UI_URL: ${VITE_JAEGER_UI_URL:-http://localhost:16686}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
    container_name: mukthiguru-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
  # --- GPTCache Server (Distributed Semantic Cache) ---
  # Overrides command to uninstall broken 'faiss' package and install 'faiss-cpu'
  # to fix the 'AttributeError: module faiss has no attribute index_factory' crash.
  gptcache-server:
    platform: linux/amd64
    image: zilliz/gptcache:latest
    container_name: mukthiguru-gptcache-server
    ports:
      - "8001:8000"
    environment:
      - GPTCACHE_CONFIG=/config/gptcache_config.yml
    command: >
      sh -c "pip uninstall -y faiss faiss-cpu && pip install --no-cache-dir faiss-cpu && exec gptcache_server -s 0.0.0.0 -p 8000 -d /data"
    volumes:
      - ../gptcache_config.yml:/config/gptcache_config.yml:ro
      - gptcache_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import http.client; conn = http.client.HTTPConnection('localhost', 8000, timeout=2); conn.request('GET', '/'); conn.getresponse()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'


  # --- Prometheus Monitoring Scraper ---
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mukthiguru-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # --- Grafana Analytics Dashboard ---
  grafana:
    image: grafana/grafana:10.4.1
    container_name: mukthiguru-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
    volumes:
      - ../infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

volumes:
  gptcache_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  redis_data:
    driver: local
  hf_model_cache:
    driver: local
  telemetry_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local



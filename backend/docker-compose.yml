# ============================================================
# Mukthi Guru — Full Stack Docker Compose
#
# Services:
#   1. qdrant       — Vector database (persistent storage)
#   2. backend      — FastAPI app (the RAG pipeline)
#   3. ingest-ui    — Ingestion portal (Nginx static frontend)
#
# Ollama runs on the HOST machine (not in Docker) because:
#   - Windows Docker doesn't support GPU passthrough easily
#   - Ollama Desktop is already installed and running
#   - The backend connects to Ollama via host.docker.internal
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Watch logs
#   docker compose down           # Stop all services
# ============================================================

services:
  # --- Neo4j Database ---
  neo4j:
    image: neo4j:5.17.0
    container_name: mukthiguru-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
  
  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: mukthiguru-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-mukthiguru_redis_secret_123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mukthiguru_redis_secret_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: mukthiguru-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --- FastAPI Backend ---
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mukthiguru-backend
    ports:
      - "8000:8000"
    environment:
      # Model Preset: "qwen" (default) or "sarvam" (requires custom GGUF import)
      - MODEL_PRESET=${MODEL_PRESET:-qwen}
      # Ollama runs on the HOST, not in Docker
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Qdrant runs as a sibling container
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=spiritual_wisdom
      - QDRANT_LOCAL_PATH=
      # Neo4j Graph DB
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      # Embedding models (downloaded on first run)
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DIMENSION=1024
      - RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      # Whisper / Transcription
      - WHISPER_MODEL=large-v3
      - WHISPER_BACKEND=faster-whisper
      - WHISPER_COMPUTE_TYPE=float16
      - TRANSCRIPT_LANGUAGES=en,hi,te,ta,kn,ml,bn,gu,mr,pa
      - TRANSCRIPT_CONCURRENT_WORKERS=4
      # Redis cache
      - REDIS_URL=redis://:${REDIS_PASSWORD:-mukthiguru_redis_secret_123}@redis:6379/0
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      # Development only. In production, set this to allowed origins (e.g. https://myapp.com)
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Allow access to host's Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  redis_data:
    driver: local

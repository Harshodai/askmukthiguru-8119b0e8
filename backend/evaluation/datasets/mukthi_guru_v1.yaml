# Mukthi Guru — Evaluation Dataset v1
#
# 50 stratified questions across 13 categories. Doubles as a regression suite:
# the four queries that failed in results/query_results.json (2026-06-16) are
# explicitly included and marked with `tags: [regression]` so a future failure
# on any of them is impossible to miss.
#
# Schema (per question):
#   id:                 stable identifier, never reused
#   category:           free-form category label (used for per-stratum reporting)
#   language:           "en" | "hi" | "ta" | "hinglish" | "tanglish"
#   text:               the question, exactly as a user would type it
#   expected_refusal:   true if a refusal / redirect is the correct response
#   tags:               optional list (e.g. [regression, multilingual, doctrine])
#   notes:              optional free-form context for whoever maintains this
#
# Total: 50 questions. Expand to 200 per the plan in RAG_QUALITY.md §6.

version: 1
generated: "2026-06-16"
notes: |
  Created from the failing benchmark queries plus targeted coverage of each
  stratum required by the LLM-judge harness. Maintained as a single YAML so
  that adding a question does not require code changes.


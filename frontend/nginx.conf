server {
    listen 80;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA serving
    root /usr/share/nginx/html/app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache — preserve server-level security headers by
    # repeating them here. Nginx `add_header` in a location block replaces
    # inherited headers unless re-declared.
    location ~* \.(js|css|png|jpg|ico|woff2|svg)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
